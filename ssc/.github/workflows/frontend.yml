name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'web/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'web/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run lint
        continue-on-error: true

      - run: npm run build
        env:
          NODE_ENV: production
