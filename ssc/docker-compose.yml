version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ssc-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ssc}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ssc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ssc-server
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ssc}?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-me-refresh-in-production}
      - PORT=3001
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - API_URL=${API_URL:-http://localhost/api}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - prod

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ssc-web
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      - server
    profiles:
      - prod

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: ssc-nginx
    ports:
      - "80:80"
    depends_on:
      - web
      - server
    profiles:
      - prod

  server-dev:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: ssc-server-dev
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ssc}?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-development}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-me-refresh-in-development}
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:
