version: '3.8'

services:
  frontend:
    build:
      context: ./website-platform
      dockerfile: Dockerfile
    container_name: dj-frontend-staging
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=staging
      - NEXT_PUBLIC_API_URL=http://backend:4000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - staging-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dj-backend-staging
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      - NODE_ENV=staging
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/dj_platform_staging
      - PORT=4000
      - JWT_SECRET=staging-jwt-secret-change-me
      - JWT_REFRESH_SECRET=staging-refresh-secret-change-me
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - staging-network

  db:
    image: postgres:16-alpine
    container_name: dj-postgres-staging
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dj_platform_staging
    volumes:
      - postgres-data-staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - staging-network

  nginx:
    image: nginx:alpine
    container_name: dj-nginx-staging
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-conf-staging:/etc/letsencrypt
      - certbot-www-staging:/var/www/certbot
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - staging-network

  certbot:
    image: certbot/certbot
    container_name: dj-certbot-staging
    volumes:
      - certbot-conf-staging:/etc/letsencrypt
      - certbot-www-staging:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres-data-staging:
  certbot-conf-staging:
  certbot-www-staging:

networks:
  staging-network:
    driver: bridge
